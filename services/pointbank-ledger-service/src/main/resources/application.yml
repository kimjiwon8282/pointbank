server:
  port: 8084

spring:
  application:
    name: pointbank-ledger-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${LEDGER_DB_URL:jdbc:mysql://localhost:3306/ledger_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:pointbank}
    password: ${DB_PASSWORD:pointbank}

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.pointbank.ledger
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

pointbank:
  sqs:
    endpoint: ${SQS_ENDPOINT:http://localhost:4566}
    region: ${AWS_REGION:ap-northeast-2}
    ledger-command-queue-url: ${LEDGER_COMMAND_QUEUE_URL:http://localhost:4566/000000000000/ledger-command-queue.fifo}
    ledger-command-dlq-url: ${LEDGER_COMMAND_DLQ_URL:http://localhost:4566/000000000000/ledger-command-dlq.fifo}
    securities-result-queue-url: ${SECURITIES_RESULT_QUEUE_URL:http://localhost:4566/000000000000/securities-result-queue.fifo}
    securities-result-dlq-url: ${SECURITIES_RESULT_DLQ_URL:http://localhost:4566/000000000000/securities-result-dlq.fifo}

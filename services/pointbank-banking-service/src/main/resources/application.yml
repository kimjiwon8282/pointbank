server:
  port: 8082

spring:
  application:
    name: pointbank-banking-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${BANKING_DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

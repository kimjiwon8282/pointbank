server:
  port: 8080

spring:
  application:
    name: pointbank-gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/auth/**
            - id: banking-service
              uri: ${BANKING_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/banking/**
              filters:
                - BankingAuthentication
            - id: securities-service
              uri: ${SECURITIES_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/securities/**
              filters:
                - BankingAuthentication
            - id: quote-service
              uri: ${QUOTE_SERVICE_URL:http://localhost:8085}
              predicates:
                - Path=/api/quotes/**
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins:
                  - http://localhost:5173
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowed-headers:
                  - Authorization
                  - Content-Type
                allow-credentials: false
            add-to-simple-url-handler-mapping: true

management:
  endpoints:
    web:
      exposure:
        include: health

pointbank:
  auth:
    validate-url: ${AUTH_VALIDATE_URL:http://localhost:8081/internal/auth/validate}
    timeout: 2s

# kind 클러스터 정의 — 게이트웨이 NodePort(30080)를 호스트 8080으로 노출.
# 사용: kind create cluster --config k8s/kind-cluster.yaml
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: pointbank
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP

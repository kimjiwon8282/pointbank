apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
  labels: { app: localstack }
spec:
  replicas: 1
  selector:
    matchLabels: { app: localstack }
  template:
    metadata:
      labels: { app: localstack }
    spec:
      containers:
        - name: localstack
          image: localstack/localstack:3.8
          ports:
            - containerPort: 4566
          env:
            - name: SERVICES
              value: sqs
            - name: DEFAULT_REGION
              value: ap-northeast-2
            - name: AWS_DEFAULT_REGION
              value: ap-northeast-2
          volumeMounts:
            - name: init
              mountPath: /etc/localstack/init/ready.d
              readOnly: true
          readinessProbe:
            httpGet: { path: /_localstack/health, port: 4566 }
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
      volumes:
        - name: init
          configMap:
            name: localstack-init
---
apiVersion: v1
kind: Service
metadata:
  name: localstack
  labels: { app: localstack }
spec:
  selector: { app: localstack }
  ports:
    - port: 4566
      targetPort: 4566

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels: { app: gateway }
spec:
  replicas: 1
  selector:
    matchLabels: { app: gateway }
  template:
    metadata:
      labels: { app: gateway }
    spec:
      # WebFlux 게이트웨이는 라우팅이 지연 바인딩이라 다운스트림 기동 전에도 떠도 됨.
      containers:
        - name: gateway
          image: infra-pointbank-gateway-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: AUTH_SERVICE_URI
              value: http://auth:8081
            - name: BANKING_SERVICE_URI
              value: http://banking:8082
            - name: SECURITIES_SERVICE_URI
              value: http://securities:8083
            - name: AUTH_VALIDATE_URL
              value: http://auth:8081/internal/auth/validate
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels: { app: gateway }
spec:
  selector: { app: gateway }
  ports:
    - port: 8080
      targetPort: 8080

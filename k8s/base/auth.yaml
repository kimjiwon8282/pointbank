apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  labels: { app: auth }
spec:
  replicas: 1
  selector:
    matchLabels: { app: auth }
  template:
    metadata:
      labels: { app: auth }
    spec:
      # DB 스키마가 준비될 때까지 대기 (compose의 depends_on: service_healthy 대체)
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z mysql 3306; do echo waiting-mysql; sleep 2; done"]
      containers:
        - name: auth
          image: infra-pointbank-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: AUTH_DB_URL
              value: jdbc:mysql://mysql:3306/auth_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
            - name: DB_USERNAME
              valueFrom: { secretKeyRef: { name: pointbank-secret, key: DB_USERNAME } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: pointbank-secret, key: DB_PASSWORD } }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8081 }
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8081 }
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  labels: { app: auth }
spec:
  selector: { app: auth }
  ports:
    - port: 8081
      targetPort: 8081

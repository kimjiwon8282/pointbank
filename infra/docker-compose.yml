services:
  pointbank-mysql:
    image: mysql:8.4
    container_name: pointbank-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - pointbank-mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  pointbank-localstack:
    image: localstack/localstack:3.8
    container_name: pointbank-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      DEFAULT_REGION: ap-northeast-2
      AWS_DEFAULT_REGION: ap-northeast-2
    volumes:
      - ./localstack/init:/etc/localstack/init/ready.d

  pointbank-redis:
    image: redis:7-alpine
    container_name: pointbank-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - pointbank-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pointbank-mysql-data:
  pointbank-redis-data:
